<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi IA Saas - Panel de control</title>
</head>


<body>
  <div class="app-container">
      <aside class="sidebar">
        <div class="logo-area">
          <h2>IA MASTER</h2>
        </div>
        <nav class="menu-lateral">
          <button>+ Nuevo Chat</button>
        <div class="historial">
          <p>Historia Reciente ...</p>
          <ul>
            <li>¿Cómo hacer dieta?</li>
            <li>Recetas sanas</li>
          </ul>
        </div>
      </nav>
      <div class="perfil">
        <span>Usuario Pro</span>
      </div>
    </aside>

    <main class="chat-area">

      <header class="chat-area-header">
        <h3>Conversacion Actual</h3>
      </header>

      <section class="mensaje-container">
        <div class="mensaje-ia">¡Hola! ¿En que te puedo ayudar?</div>
      </section>

      <footer class="input-area">
        <form class="chat-form">
          <input type="text" placeholder="Escribe tu pregunta aqui ...">
          <button type="submit">Enviar</button>
        </form>
      </footer>
    </main>
  </div>
</body>

</html>
